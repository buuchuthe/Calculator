<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temperature Sensors</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div class="main-container">
    <div class="card">
      <a href="../index.html">← Home</a>
      <h2>Temperature Sensors</h2>
    </div>

    <div class="card">
      <label>Sensor Type:</label>
      <select id="sensor-type" onchange="toggleInputs()">
        <optgroup label="RTD / Thermistor">
          <option value="pt100" selected="selected">PT100</option>
          <option value="pt1000">PT1000</option>
          <option value="ni100">NI100</option>
          <option value="ni1000">NI1000</option>
          <option value="cu100">CU100</option>
          <option value="cu1000">CU1000</option>
          <option value="ntc10k">NTC 10K</option>
        </optgroup>
        <optgroup label="Thermocouples">
          <option value="tc_b">Type B</option>
          <option value="tc_e">Type E</option>
          <option value="tc_j">Type J</option>
          <option value="tc_k">Type K</option>
          <option value="tc_n">Type N</option>
          <option value="tc_r">Type R</option>
          <option value="tc_s">Type S</option>
          <option value="tc_t">Type T</option>
        </optgroup>
      </select>
    </div>

    <div class="card">
      <label>Calculate For:</label>
      <select id="calc-mode" onchange="updateLabels()">
        </select>
    </div>

    <div class="card">
      <label id="input-label">Input Value:</label>
      <div style="display: flex; gap: 5px;">
        <input type="number" id="input-val" value="100" step="0.01">
        <span id="unit-label">Ω</span>
      </div>
    </div>

    <div class="card">
      <button id="calc-btn" onclick="calculate()">Calculate</button>
    </div>

    <div class="result-card">
      <span id="res-label">Temperature</span>
      <div id="res-val">--</div>
    </div>

    <div class="card">
      <div style="cursor: pointer; color: #007bff; display: flex; align-items: center; gap: 5px;" onclick="toggleInfo()">
        <span style="border: 1px solid #007bff; border-radius: 50%; width: 18px; height: 18px; display: inline-flex; justify-content: center; align-items: center; font-size: 12px; font-weight: bold;">i</span>
        <span style="font-size: 0.9rem;">Data source</span>
      </div>
      
      <div id="info-content" style="display: none; font-size: 0.85rem; color: #555; line-height: 1.4; margin-top: 10px; background: #f9f9f9; padding: 10px; border-radius: 8px;">
        <a href="https://reotemp.com/thermocouple-types/">Types of Thermocouples</a>
      </div>
    </div>

  </div>
  <script src="../assets/js/calculate_temperature_by_sensor.js"></script>
</body>
</html>
