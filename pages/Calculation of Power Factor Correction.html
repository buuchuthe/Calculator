<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Power Factor Correction Calculator</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div class="main-box">
    <div class="vbox">
      <a href="../index.html">← Home</a>
    <h2>Power Factor Correction</h2>
    </div>

    <div class="hbox">
      <span>Connection Type:</span>
      <select id="conn-type">
        <option value="1p">1-Phase</option>
        <option value="3pd">3-Phase Delta (Δ)</option>
        <option value="3ps">3-Phase Star (Y)</option>
      </select>
    </div>

    <div class="hbox">
      <span>Line Voltage (V):</span>
      <input type="number" id="sys-v" value="400">
    </div>
    
    <div class="hbox">
      <span>Freq (Hz):</span>
      <input type="number" id="sys-f" value="50">
    </div>  

    <div class="hbox">
      <span>Load Value:</span>
      <input type="number" id="load-val" value="50">
      <select id="load-unit">
        <option value="kw" selected="selected">kW</option>
        <option value="w">W</option>
        <option value="mw">MW</option>
        <option value="kva">kVA</option>
        <option value="mva">MVA</option>
      </select>
    </div>

    <div class="hbox">
      <span>Current PF:</span>
      <input type="number" id="pf-now" value="0.95" min="0.01" max="1" step="0.01">
    </div>
      
    <div class="hbox">
      <span>Target PF:</span>
      <input type="number" id="pf-aim" value="0.95" min="0.01" max="1" step="0.01">
    </div>

    <div class="vbox">
      <button id="calc-btn" onclick="calculate()">Calculate</button>
    </div>

    <div class="vbox" style="border-left: 5px solid #007bff; padding: 10px;">
      <p>Required Bank Size: <strong id="res-kvar">0</strong> kVAr</p>
      <p>Capacitance (per phase): <strong id="res-uf">0</strong> μF</p>
      <p>Bank Line Current: <strong id="res-amp">0</strong> A</p>
    </div>
  </div>

<script src="../assets/js/calculate_pf_correction.js"></script>
</body>
</html>
