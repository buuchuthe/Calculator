<!DOCTYPE html>

      <h2>Pipes and Fittings</h2>

    <div class="hbox">
      <span>Type:</span>
      <select id="type">
        <option value="" selected="selected">Select an option</option>

    </div>

    <div class="hbox">
      <span>Subtype:</span>
