<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mechanical Fasteners Guide</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div class="main-container">
    <div class="card">
      <a href="../index.html">← Home</a>
      <h2>Mechanical Fasteners (Linh Kiện Lắp Ghép)</h2>
    </div>
    
    <div class="card">
      <p>Hardware type</p>
      <select id="hardware">
        <option value="" selected="selected">Select a type</option>
      </select>
    </div>

    <div class="card">
      <label>Specification</label>
      <select id="spec">
        <option value="" selected="selected">Select a spec</option>
      </select>
    </div>

    <div class="result-card" id="result" style="display: block;">
    </div>

    <div class="card">
      <p id="description"></p>
      <img id="dimension" src="" alt="Dimension Drawing" style="width:100%; height:auto; display:none;">
    </div>

    <div class="card">
      <div style="cursor: pointer; color: #007bff; display: flex; align-items: center; gap: 5px;" onclick="toggleInfo()">
        <span style="border: 1px solid #007bff; border-radius: 50%; width: 18px; height: 18px; display: inline-flex; justify-content: center; align-items: center; font-size: 12px; font-weight: bold;">i</span>
        <span style="font-size: 0.9rem;">Data source</span>
      </div>
      
      <div id="info-content" style="display: none; font-size: 0.85rem; color: #555; line-height: 1.4; margin-top: 10px; background: #f9f9f9; padding: 10px; border-radius: 8px;">
        <a href="https://www.globalfastener.com/standards/">Standard & CAD - Global Fastener</a>
      </div>
    </div>
  </div>

  <script src="../assets/js/mecha_fastener_select.js"></script>
</body>
</html>
