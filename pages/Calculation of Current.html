<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Electrical Current Calculator</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div class="main-box">
    <div class="vbox">
      <a href="../index.html">← Home</a>
      <h2>Current Calculator</h2>
    </div>
    
    <div class="vbox">
      <p>Current type</p>
      <div class="hbox">
        <label><input type="radio" name="system" value="dc" checked> DC</label>
        <label><input type="radio" name="system" value="ac1"> AC 1-Phase</label>
        <label><input type="radio" name="system" value="ac3"> AC 3-Phase</label>
      </div>
    </div>

    <div class="vbox">
      <p>Calculation Parameters</p>
      <select id="param-selector"></select>
    </div>

    <div id="input-fields"></div>
      
    <div id="pf-container" class="vbox" style="display:none;">
      <p>Phase Factor / Angle</p>
      <div class="hbox">
        <select id="pf-type">
          <option value="cos">cos φ (PF)</option>
          <option value="sin">sin φ</option>
          <option value="tan">tan φ</option>
          <option value="rad">φ (rad)</option>
          <option value="deg">φ (°)</option>
        </select>
        <input type="number" id="pf-value" value="0.85" step="0.01">      
      </div>
    </div>

    <div class="card">
      <button id="calc-btn">Calculate Current</button>
    </div>

    <div class="result-card">
      <span>Current (I):</span>
      <span id="current-output" style="color: #007bff; font-weight: bold;">--</span>
    </div>
  </div>

  <script src="../assets/js/calculate_current.js"></script>
</body>
</html>
